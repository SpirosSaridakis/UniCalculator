<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="0; url='./index.html'" />
</head>
<body>
  <script>
    // Redirect all 404 requests to index.html to enable Blazor routing
    var path = window.location.pathname;
    if (path.startsWith('/UniCalculator/')) {
      window.location.replace("/UniCalculator/index.html");
    } else {
      window.location.replace("/");
    }
  </script>
</body>
</html>
